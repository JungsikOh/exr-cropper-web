<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EXR Cropper Web</title>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar" aria-label="Crop controls">
        <header class="app-header">
          <h1>EXR Cropper</h1>
          <div id="image-meta" class="image-meta">No EXR loaded</div>
        </header>

        <section class="panel">
          <div class="panel-title">Files</div>
          <input id="file-input" type="file" accept=".exr,.EXR" multiple hidden />
          <div class="button-row">
            <button id="add-files" type="button" class="primary"></button>
            <button id="remove-file" type="button"></button>
          </div>
          <ul id="file-list" class="list file-list" aria-label="Loaded EXR files"></ul>
          <button id="set-ref" type="button"></button>
          <div id="ref-label" class="meta">Ref: none</div>
        </section>

        <section class="panel">
          <div class="panel-title">Crop Boxes</div>
          <ul id="box-list" class="list box-list" aria-label="Crop boxes"></ul>
          <div class="button-row">
            <button id="add-box" type="button"></button>
            <button id="remove-box" type="button"></button>
          </div>
          <label class="field">
            <span>Box Color</span>
            <input id="box-color" type="color" value="#ffd250" />
          </label>
        </section>

        <section class="panel">
          <div class="panel-title">Coordinates</div>
          <div class="grid-fields">
            <label class="field"><span>X</span><input id="coord-x" type="number" min="0" step="1" /></label>
            <label class="field"><span>Y</span><input id="coord-y" type="number" min="0" step="1" /></label>
            <label class="field"><span>Width</span><input id="coord-w" type="number" min="1" step="1" /></label>
            <label class="field"><span>Height</span><input id="coord-h" type="number" min="1" step="1" /></label>
          </div>
          <label class="field">
            <span>Line Width</span>
            <input id="line-width" type="number" min="1" max="32" step="1" value="3" />
          </label>
          <label class="field">
            <span>Exposure</span>
            <input id="exposure" type="range" min="-10" max="10" step="0.25" value="0" />
            <output id="exposure-value">0.00 stops</output>
          </label>
        </section>

        <button id="export" type="button" class="export"></button>
        <div id="status" class="status" role="status">Ready</div>
      </aside>

      <main class="workspace">
        <canvas id="preview" aria-label="EXR preview canvas"></canvas>
        <div class="drop-hint" id="drop-hint">
          <strong>No EXR loaded</strong>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
